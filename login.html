<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Licence Manager Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text2: #8888aa;
            --primary: #7c3aed;
            --primary-hover: #6d28d9;
            --primary-light: rgba(124,58,237,0.12);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .login-wrapper {
            width: 100%; max-width: 400px;
        }
        .login-logo {
            text-align: center; margin-bottom: 2rem;
        }
        .login-logo .shield {
            width: 56px; height: 56px;
            background: var(--primary);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 8px 32px rgba(124,58,237,0.35);
        }
        .login-logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
        .login-logo p  { font-size: 13px; color: var(--text2); margin-top: 0.3rem; }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 0.4rem; }
        input[type=text], input[type=password] {
            width: 100%; padding: 0.65rem 0.9rem;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px;
            outline: none; transition: border 0.15s, box-shadow 0.15s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        .btn-login {
            width: 100%; padding: 0.75rem;
            background: var(--primary); color: #fff;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 1.5rem;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-login:hover { background: var(--primary-hover); }
        .btn-login:active { transform: scale(0.99); }

        .flash {
            padding: 0.65rem 0.9rem; border-radius: 8px; font-size: 13px;
            margin-bottom: 1rem; background: var(--red-bg);
            border: 1px solid rgba(239,68,68,0.3); color: var(--red);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <div class="shield">
                <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1>Licence Manager Pro</h1>
            <p>Accès au panel d'administration</p>
        </div>

        <div class="login-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
        </div>
    </div>
</body>
</html>
